<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Inmobiliaria</title>
  <link rel="stylesheet" href="css/estilos.css">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
<script>if(localStorage.getItem('dayMode')==='true')document.body.classList.add('day');</script>

<!-- LOGIN SCREEN -->
<div id="login-screen">

  <!-- Estado 1: Login -->
  <div id="state-login" class="login-box">
    <div class="login-logo">🏠</div>
    <div class="login-title">CRM DEMO</div>
    <input id="l-user" class="form-input" placeholder="Usuario" autocomplete="username">
    <input id="l-pass" class="form-input" type="password" placeholder="Contraseña"
           autocomplete="current-password" onkeydown="if(event.key==='Enter')loginSubmit()">
    <button class="btn-primary" onclick="loginSubmit()">Entrar</button>
    <div id="l-error" class="login-error"></div>
    <div class="login-links">
      <a href="#" onclick="event.preventDefault();showState('recover')">¿Olvidaste tu contraseña?</a>
      <a href="#" onclick="event.preventDefault();showState('register')">Crear cuenta nueva</a>
    </div>
  </div>

  <!-- Estado 2: Registro -->
  <div id="state-register" class="login-box" style="display:none">
    <div class="login-title">Crear cuenta</div>
    <input id="r-nombre" class="form-input" placeholder="Nombre completo">
    <input id="r-user"   class="form-input" placeholder="Usuario" autocomplete="username">
    <input id="r-email"  class="form-input" type="email" placeholder="Email">
    <input id="r-pass"   class="form-input" type="password" placeholder="Contraseña">
    <input id="r-pass2"  class="form-input" type="password" placeholder="Repetir contraseña">
    <select id="r-role" class="form-input">
      <option value="agente">Agente</option>
      <option value="manager">Manager</option>
    </select>
    <button class="btn-primary" onclick="registerSubmit()">Registrarse</button>
    <div id="r-error" class="login-error"></div>
    <div class="login-links">
      <a href="#" onclick="event.preventDefault();showState('login')">← Volver al login</a>
    </div>
  </div>

  <!-- Estado 3: Recuperar contraseña -->
  <div id="state-recover" class="login-box" style="display:none">
    <div class="login-title">Recuperar contraseña</div>
    <input id="rec-email" class="form-input" type="email" placeholder="Tu email de cuenta">
    <button class="btn-primary" onclick="recoverSubmit()">Enviar enlace</button>
    <div id="rec-msg" class="login-error"></div>
    <div class="login-links">
      <a href="#" onclick="event.preventDefault();showState('login')">← Volver al login</a>
    </div>
  </div>

</div>

<!-- CRM APP -->
<div id="crm-app" style="display:none">
<div id="sidebar-overlay" onclick="closeMobileSidebar()"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Menú">
        <span></span><span></span><span></span>
      </button>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-btn" data-view="dashboard"   id="nav-dashboard"   onclick="setView('dashboard')">
        <span class="nav-icon">📊</span><span class="sidebar-text"> Dashboard</span>
      </button>
      <button class="nav-btn" data-view="pipeline"    id="nav-pipeline"    onclick="setView('pipeline')">
        <span class="nav-icon">🔀</span><span class="sidebar-text"> Pipeline</span>
      </button>
      <button class="nav-btn" data-view="lista"       id="nav-lista"       onclick="setView('lista')">
        <span class="nav-icon">📋</span><span class="sidebar-text"> Lista</span>
      </button>
      <button class="nav-btn" data-view="visitas"     id="nav-visitas"     onclick="setView('visitas')">
        <span class="nav-icon">🏠</span><span class="sidebar-text"> Visitas</span>
      </button>
      <button class="nav-btn" data-view="propiedades" id="nav-propiedades" onclick="setView('propiedades')">
        <span class="nav-icon">🏢</span><span class="sidebar-text"> Propiedades</span>
      </button>
      <button class="nav-btn" data-view="facturas"    id="nav-facturas"    onclick="setView('facturas')">
        <span class="nav-icon">🧾</span><span class="sidebar-text"> Facturas</span>
      </button>
      <button class="nav-btn" data-view="calendario"  id="nav-calendario"  onclick="setView('calendario')">
        <span class="nav-icon">📅</span><span class="sidebar-text"> Calendario</span>
      </button>
      <button class="nav-btn" data-view="vacaciones"  id="nav-vacaciones"  onclick="setView('vacaciones')">
        <span class="nav-icon">🌴</span><span class="sidebar-text"> Vacaciones</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-warm sidebar-text-btn" onclick="toggleTheme()">
        <span class="nav-icon" id="theme-icon">☀️</span>
        <span class="sidebar-text" id="theme-label"> Modo día</span>
      </button>
      <div class="sidebar-user">
        <span class="nav-icon">👤</span>
        <span id="user-info" class="sidebar-text user-info-badge"></span>
      </div>
      <button class="btn-logout" onclick="doLogout()">
        <span class="nav-icon">🚪</span><span class="sidebar-text"> Salir</span>
      </button>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div id="main-area">
    <div id="topbar">
      <button id="mobile-menu-btn" onclick="openMobileSidebar()">
        <span></span><span></span><span></span>
      </button>
      <div class="sidebar-logo" id="crm-logo">🏠 CRM DEMO</div>
      <button class="btn-new-lead" onclick="openForm()">+ Lead</button>
    </div>
    <div id="stats"></div>
    <div id="content"></div>
  </div>

<!-- MODAL LEAD -->
<div id="modal-lead" class="modal-overlay" onclick="if(event.target===this)closeForm()">
  <div class="modal-box">
    <h2 id="form-title">Nuevo Lead</h2>
    <form id="lead-form" onsubmit="saveForm(event)">
      <div class="form-grid">
        <label>Nombre * <input name="nombre" class="form-input" required></label>
        <label>Email <input type="email" name="email" class="form-input"></label>
        <label>Teléfono <input name="telefono" class="form-input"></label>
        <label>Portal <input name="portal" class="form-input" placeholder="Idealista, Fotocasa..."></label>
        <label>Estado <select name="estado" class="form-input">
          <option>Nuevo</option><option>Contactado</option><option>Visita agendada</option>
          <option>Propuesta</option><option>Cerrado ✓</option><option>Perdido ✗</option>
        </select></label>
        <label>Calidad <select name="calidad" class="form-input">
          <option value="">Sin calificar</option><option>Frío</option><option>Templado</option><option>Caliente</option>
        </select></label>
        <label>Inmueble <input name="inmueble" class="form-input"></label>
        <label>Zona <input name="zona" class="form-input"></label>
        <label>Presupuesto (€) <input type="number" name="presupuesto" class="form-input"></label>
        <label>Agente <input name="agente" class="form-input"></label>
        <label>Fecha <input type="date" name="fecha" class="form-input"></label>
        <label>Fecha Visita <input type="date" name="fecha_visita" class="form-input"></label>
      </div>
      <div style="display:flex;gap:.5rem;margin-top:1rem">
        <button type="submit" class="btn-primary">Guardar</button>
        <button type="button" class="btn-secondary" onclick="closeForm()">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL DETALLE LEAD -->
<div id="modal-detail" class="modal-overlay" onclick="if(event.target===this)closeForm()">
  <div class="modal-box">
    <div id="detail-body"></div>
  </div>
</div>

<!-- MODAL VISITA -->
<div id="modal-visita" class="modal-overlay" onclick="if(event.target===this)closeFormVisita()">
  <div class="modal-box">
    <div id="modal-visita-body"></div>
  </div>
</div>

<!-- MODAL PROPIEDAD -->
<div id="modal-prop" class="modal-overlay" onclick="if(event.target===this)closeFormProp()">
  <div class="modal-box" style="max-width:700px">
    <div id="modal-prop-body"></div>
  </div>
</div>

<!-- MODAL FACTURA -->
<div id="modal-fact" class="modal-overlay" onclick="if(event.target===this)closeFormFact()">
  <div class="modal-box" style="max-width:700px">
    <div id="modal-fact-body"></div>
  </div>
</div>

<!-- MODAL VACACIONES -->
<div id="modal-vac" class="modal-overlay" onclick="if(event.target===this)closeFormVacacion()">
  <div class="modal-box" style="max-width:420px">
    <h2>Solicitar Vacaciones</h2>
    <form id="vac-form" onsubmit="saveVacacion(event)" style="display:flex;flex-direction:column;gap:.85rem;margin-top:1rem">
      <label>Fecha inicio <input type="date" name="fecha_inicio" class="form-input" required></label>
      <label>Fecha fin    <input type="date" name="fecha_fin"    class="form-input" required></label>
      <label>Motivo       <textarea name="motivo" class="form-input" rows="3" placeholder="Motivo (opcional)"></textarea></label>
      <div style="display:flex;gap:.5rem">
        <button type="submit" class="btn-primary">Enviar solicitud</button>
        <button type="button" class="btn-secondary" onclick="closeFormVacacion()">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL CONFIRMAR BORRADO -->
<div id="modal-del" class="modal-overlay">
  <div class="modal-box" style="max-width:380px;text-align:center">
    <h2 style="margin-bottom:.75rem">¿Eliminar lead?</h2>
    <p style="color:#94A3B8;margin-bottom:1.5rem">Esta acción no se puede deshacer.</p>
    <div style="display:flex;gap:.75rem;justify-content:center">
      <button class="btn-danger" onclick="confirmDelete()">Eliminar</button>
      <button class="btn-secondary" onclick="closeDel()">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL CALENDARIO DÍA -->
<div id="modal-cal" class="modal-overlay" style="display:none"
     onclick="if(event.target===this)this.style.display='none'">
  <div class="modal-box" style="max-width:500px">
    <div id="modal-cal-body"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

</div><!-- #crm-app -->

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/leads-render.js"></script>
<script src="js/leads-form.js"></script>
<script src="js/visitas.js"></script>
<script src="js/propiedades.js"></script>
<script src="js/facturas.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/calendario.js"></script>
<script src="js/vacaciones.js"></script>
<script src="js/auth.js"></script>
<script>checkSession();</script>
</body>
</html>
